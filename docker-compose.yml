services:
  compensation-bot:
    image: ghcr.io/silverkeys-dev/compensation-bot:latest
    container_name: compensation-bot
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    env_file:
      - .env
    volumes:
      # Persist database
      - ./compensation_tickets.db:/app/compensation_tickets.db
      # Persist data directory
      - ./data:/app/data
      # Persist key mode config
      - ./config:/app/config
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
